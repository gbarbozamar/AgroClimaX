services:
  - type: web
    name: agroclimax-api
    runtime: docker
    dockerfilePath: ./apps/backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: COPERNICUS_CLIENT_ID
        sync: false          # ingresa manualmente en Render dashboard
      - key: COPERNICUS_CLIENT_SECRET
        sync: false
      - key: CDS_API_KEY
        sync: false
      - key: PORT
        value: "8000"
