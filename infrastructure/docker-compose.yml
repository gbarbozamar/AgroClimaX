version: "3.9"

services:
  db:
    image: timescale/timescaledb-ha:pg16-latest
    environment:
      POSTGRES_DB: agroclimax
      POSTGRES_USER: agroclimax
      POSTGRES_PASSWORD: agroclimax_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-postgis.sql:/docker-entrypoint-initdb.d/init-postgis.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../apps/backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ../apps/backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    env_file:
      - ../apps/backend/.env
    depends_on:
      - db
      - redis
    command: celery -A tasks.pipeline_task.celery_app worker --loglevel=info

  celery-beat:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    env_file:
      - ../apps/backend/.env
    depends_on:
      - db
      - redis
    command: celery -A tasks.pipeline_task.celery_app beat --loglevel=info

volumes:
  pgdata:
