version: "3.9"

services:
  db:
    image: timescale/timescaledb-ha:pg16-latest
    environment:
      POSTGRES_DB: agroclimax
      POSTGRES_USER: agroclimax
      POSTGRES_PASSWORD: agroclimax_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-postgis.sql:/docker-entrypoint-initdb.d/init-postgis.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../apps/backend/.env
    depends_on:
      - db
      - redis
    environment:
      APP_RUNTIME_ROLE: web
      PIPELINE_SCHEDULER_ENABLED: "false"
      SERVE_TILES_INTERNAL: "true"
      DISABLE_HEURISTIC_READY: "false"
      TILESERVER_INTERNAL_URL: "http://tiles:8100"
    volumes:
      - ../apps/backend/app:/app/app
      - ../apps/backend/tasks:/app/tasks
      - ../apps/backend/data_fetcher.py:/app/data_fetcher.py
      - ../apps/frontend:/frontend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    env_file:
      - ../apps/backend/.env
    depends_on:
      - db
      - redis
    environment:
      APP_RUNTIME_ROLE: worker
      PIPELINE_SCHEDULER_ENABLED: "true"
      SERVE_TILES_INTERNAL: "true"
      DISABLE_HEURISTIC_READY: "false"
      TILESERVER_INTERNAL_URL: "http://tiles:8100"
    volumes:
      - ../apps/backend/app:/app/app
      - ../apps/backend/tasks:/app/tasks
      - ../apps/backend/data_fetcher.py:/app/data_fetcher.py
      - ../apps/frontend:/frontend
    command: python -m app.worker

  tiles:
    build:
      context: ..
      dockerfile: agroclimax-tiles/Dockerfile
    env_file:
      - ../apps/backend/.env
    depends_on:
      - db
      - redis
    environment:
      PORT: "8100"
      SERVE_TILES_INTERNAL: "true"
    volumes:
      - ../apps/backend:/app/apps/backend
      - ../agroclimax-tiles:/app/agroclimax-tiles
      - ../evalscripts:/app/evalscripts
    command: uvicorn server_app:app --host 0.0.0.0 --port 8100 --reload

  smoke-api:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    depends_on:
      - backend
      - tiles
    profiles:
      - smoke
    volumes:
      - ../scripts:/app/scripts
    command: python scripts/smoke_tiles_api.py --base-url http://backend:8000

  celery-worker:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    env_file:
      - ../apps/backend/.env
    depends_on:
      - db
      - redis
    profiles:
      - legacy-celery
    command: celery -A tasks.pipeline_task.celery_app worker --loglevel=info

  celery-beat:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    env_file:
      - ../apps/backend/.env
    depends_on:
      - db
      - redis
    profiles:
      - legacy-celery
    command: celery -A tasks.pipeline_task.celery_app beat --loglevel=info

volumes:
  pgdata:
